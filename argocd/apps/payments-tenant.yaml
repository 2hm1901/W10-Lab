# ArgoCD App: payments tenant guardrails.
#
# This app creates the payments namespace and its isolation controls before the
# workload app is synced.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: payments-tenant
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: https://github.com/2hm1901/W10-Lab.git
    path: tenants/payments
    targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: payments
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true
