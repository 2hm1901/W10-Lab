# ArgoCD App: Sync AWS SecretStore, ExternalSecret, and demo secret reader.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: eso-config
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: https://github.com/2hm1901/W10-Lab.git
    path: eso
    targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: demo
  # External Secrets Operator defaulting may add fields to ExternalSecret after
  # ArgoCD applies the manifest. These are runtime/default values, not Git-owned
  # intent, so ignoring them prevents endless OutOfSync while preserving the
  # important config: storeRef, remote secret key, target secret, and refresh.
  ignoreDifferences:
  - group: external-secrets.io
    kind: ExternalSecret
    name: api-db-password
    namespace: demo
    jsonPointers:
    - /spec/refreshPolicy
    - /spec/target/deletionPolicy
    - /spec/target/template/engineVersion
    - /spec/target/template/mergePolicy
    - /spec/data/0/remoteRef/conversionStrategy
    - /spec/data/0/remoteRef/decodingStrategy
    - /spec/data/0/remoteRef/metadataPolicy
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true
    - SkipDryRunOnMissingResource=true
    - RespectIgnoreDifferences=true
