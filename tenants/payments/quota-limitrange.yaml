# Budget guardrails for the payments namespace.
#
# ResourceQuota caps total requested/limited compute for the team. LimitRange
# supplies default requests/limits so simple pods still satisfy admission and
# fit inside the namespace budget.
apiVersion: v1
kind: ResourceQuota
metadata:
  name: payments-budget
  namespace: payments
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  hard:
    requests.cpu: "1"
    requests.memory: 1Gi
    limits.cpu: "2"
    limits.memory: 2Gi
    pods: "10"
    services: "5"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: payments-defaults
  namespace: payments
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  limits:
  - type: Container
    defaultRequest:
      cpu: 50m
      memory: 64Mi
    default:
      cpu: 200m
      memory: 128Mi
    max:
      cpu: 500m
      memory: 512Mi
