# Budget guardrails for the payments namespace.
#
# ResourceQuota caps total requested/limited compute for the team. LimitRange
# supplies default requests/limits so simple pods still satisfy admission and
# fit inside the namespace budget.
apiVersion: v1
kind: ResourceQuota
metadata:
  name: payments-budget
  namespace: payments
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  hard:
    # Tổng request/limit của toàn namespace payments. Scheduler dùng requests
    # để tính tài nguyên cần đặt pod.
    requests.cpu: "1"
    requests.memory: 1Gi
    limits.cpu: "2"
    limits.memory: 2Gi
    # Giới hạn số lượng object để tránh tenant tạo quá nhiều pod/service.
    pods: "10"
    services: "5"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: payments-defaults
  namespace: payments
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  limits:
  - type: Container
    # Nếu pod không khai báo requests, Kubernetes sẽ default theo giá trị này.
    defaultRequest:
      cpu: 50m
      memory: 64Mi
    # Nếu container không khai báo limits, LimitRange sẽ default để vừa thỏa
    # Gatekeeper require limits vừa tránh container dùng quá nhiều tài nguyên.
    default:
      cpu: 200m
      memory: 128Mi
    # Max per-container trong namespace payments.
    max:
      cpu: 500m
      memory: 512Mi
