# Namespace for the payments team.
#
# The label intentionally opts the namespace into the existing Gatekeeper
# guardrails without duplicating team-specific policy objects.
apiVersion: v1
kind: Namespace
metadata:
  name: payments
  labels:
    # Label này làm Gatekeeper constraints áp vào payments. Nhờ vậy team mới
    # kế thừa guardrail cũ mà không cần copy constraint.
    guardrails.w10.dev/enforce: "true"
  annotations:
    # Namespace phải được tạo trước RBAC/quota/netpol/workload.
    argocd.argoproj.io/sync-wave: "0"
