# Namespace for the payments team.
#
# The label intentionally opts the namespace into the existing Gatekeeper
# guardrails without duplicating team-specific policy objects.
apiVersion: v1
kind: Namespace
metadata:
  name: payments
  labels:
    guardrails.w10.dev/enforce: "true"
  annotations:
    argocd.argoproj.io/sync-wave: "0"
