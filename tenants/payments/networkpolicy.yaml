# Network isolation for payments.
#
# NetworkPolicy enforcement requires a CNI that implements NetworkPolicy, for
# example Calico. The policies below make payments private by default, allow
# traffic only inside the namespace, and allow DNS egress so pods can resolve
# service names.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: payments
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  # podSelector: {} chọn tất cả pod trong namespace payments.
  podSelector: {}
  policyTypes:
  # Khi có Ingress policy chọn pod, traffic inbound không được allow rõ ràng sẽ
  # bị deny.
  - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-from-payments
  namespace: payments
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  ingress:
  - from:
    # podSelector không kèm namespaceSelector nghĩa là chỉ pod cùng namespace.
    - podSelector: {}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-payments-and-dns
  namespace: payments
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  podSelector: {}
  policyTypes:
  # Khi có Egress policy chọn pod, traffic outbound không được allow sẽ bị deny.
  - Egress
  egress:
  - to:
    # Cho phép payments pod gọi service/pod cùng namespace.
    - podSelector: {}
  - to:
    # Cho phép DNS để pod vẫn resolve được service names như *.svc.cluster.local.
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
      podSelector:
        matchLabels:
          k8s-app: kube-dns
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
