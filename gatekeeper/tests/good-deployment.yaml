apiVersion: apps/v1
kind: Deployment
metadata:
  name: gatekeeper-good
  namespace: demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gatekeeper-good
  template:
    metadata:
      labels:
        app: gatekeeper-good
    spec:
      containers:
      - name: app
        image: nginx:1.27.3
        ports:
        - containerPort: 80
        resources:
          limits:
            cpu: 100m
            memory: 64Mi
        securityContext:
          runAsUser: 101
