apiVersion: apps/v1
kind: Deployment
metadata:
  name: gatekeeper-bad-latest
  namespace: demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gatekeeper-bad-latest
  template:
    metadata:
      labels:
        app: gatekeeper-bad-latest
    spec:
      containers:
      - name: app
        image: nginx:latest
        resources:
          limits:
            cpu: 100m
            memory: 64Mi
