# Namespace: Tạo namespace demo cho API workload
apiVersion: v1
kind: Namespace
metadata:
  name: demo
  labels:
    # Gatekeeper constraints match this label, so every tenant namespace that
    # opts in gets the same admission guardrails without copying constraints.
    guardrails.w10.dev/enforce: "true"
    # Sigstore Policy Controller only enforces namespaces that opt in with this
    # label. Without it, ClusterImagePolicy exists but admission does not block
    # unsigned images in the demo namespace.
    policy.sigstore.dev/include: "true"
  annotations:
    argocd.argoproj.io/sync-wave: "0"
