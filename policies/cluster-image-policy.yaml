# ClusterImagePolicy: require a valid Cosign signature for the W10 API image.
#
# The GitHub Actions workflow signs the pushed image digest with Cosign keyless
# signing. Policy Controller verifies the Fulcio certificate identity here:
# - issuer: GitHub Actions OIDC
# - subject: this repository's build-push workflow on the main branch
#
# The webhook only enforces namespaces labeled:
# policy.sigstore.dev/include=true
apiVersion: policy.sigstore.dev/v1beta1
kind: ClusterImagePolicy
metadata:
  name: w10-api-keyless-signature
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  images:
  # Chỉ các image match pattern này mới bị policy này kiểm tra chữ ký. Image
  # khác không match thì không dùng authority bên dưới.
  - glob: ghcr.io/2hm1901/w10-api*
  authorities:
  # authority mô tả "ai/nguồn nào được tin là đã ký image".
  - name: github-actions-keyless
    keyless:
      identities:
      # issuer là OIDC issuer của GitHub Actions. Policy Controller sẽ kiểm tra
      # certificate Sigstore/Fulcio của chữ ký image có issuer này.
      - issuer: https://token.actions.githubusercontent.com
        # subject khóa chữ ký về đúng workflow build-push.yml trên branch main.
        # Image ký bởi workflow/repo/branch khác sẽ không pass policy này.
        subject: https://github.com/2hm1901/W10-Lab/.github/workflows/build-push.yml@refs/heads/main
