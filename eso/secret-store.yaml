# ClusterSecretStore points External Secrets Operator to AWS Secrets Manager.
#
# The AWS credentials secret is intentionally not committed.
# Terraform can create the IAM user/access key and generate:
# terraform/ec2/generated/w10-eso-credentials.sh
# Run that script to create secret external-secrets/aws-credentials.
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  provider:
    aws:
      service: SecretsManager
      region: ap-southeast-2
      auth:
        secretRef:
          accessKeyIDSecretRef:
            name: aws-credentials
            namespace: external-secrets
            key: access-key
          secretAccessKeySecretRef:
            name: aws-credentials
            namespace: external-secrets
            key: secret-access-key
