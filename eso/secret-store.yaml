# ClusterSecretStore points External Secrets Operator to AWS Secrets Manager.
#
# The AWS credentials secret is intentionally not committed.
# Terraform can create the IAM user/access key and generate:
# terraform/ec2/generated/w10-eso-credentials.sh
# Run that script to create secret external-secrets/aws-credentials.
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
  annotations:
    # SecretStore phải có trước ExternalSecret, nên dùng wave 0.
    argocd.argoproj.io/sync-wave: "0"
spec:
  provider:
    aws:
      # ESO sẽ gọi AWS Secrets Manager, không phải Parameter Store.
      service: SecretsManager
      # Region phải khớp nơi Terraform/AWS tạo secret w10/db-password.
      region: ap-southeast-2
      auth:
        secretRef:
          accessKeyIDSecretRef:
            # Kubernetes Secret này được tạo thủ công/generated script, không
            # commit vào Git vì chứa AWS access key.
            name: aws-credentials
            namespace: external-secrets
            key: access-key
          secretAccessKeySecretRef:
            # Key secret-access-key chứa AWS secret access key của IAM user ESO.
            name: aws-credentials
            namespace: external-secrets
            key: secret-access-key
