# ClusterSecretStore points External Secrets Operator to AWS Secrets Manager.
#
# The AWS credentials secret is intentionally not committed. Create it manually:
# kubectl create namespace external-secrets --dry-run=client -o yaml | kubectl apply -f -
# kubectl create secret generic aws-credentials -n external-secrets \
#   --from-literal=access-key="$AWS_ACCESS_KEY_ID" \
#   --from-literal=secret-access-key="$AWS_SECRET_ACCESS_KEY"
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  provider:
    aws:
      service: SecretsManager
      region: ap-southeast-2
      auth:
        secretRef:
          accessKeyIDSecretRef:
            name: aws-credentials
            namespace: external-secrets
            key: access-key
          secretAccessKeySecretRef:
            name: aws-credentials
            namespace: external-secrets
            key: secret-access-key
