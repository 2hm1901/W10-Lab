# ExternalSecret maps AWS Secrets Manager secret w10/db-password to a Kubernetes
# Secret named api-db-secret in namespace demo.
#
# Expected AWS secret value:
# {"password":"initial-db-password"}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: api-db-password
  namespace: demo
  annotations:
    # ExternalSecret sync sau ClusterSecretStore.
    argocd.argoproj.io/sync-wave: "1"
spec:
  # ESO đọc lại AWS Secrets Manager mỗi 30 giây để phát hiện rotate secret.
  refreshInterval: 30s
  secretStoreRef:
    # Dùng ClusterSecretStore nên có thể tham chiếu store ở scope toàn cluster.
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    # Kubernetes Secret được ESO tạo/cập nhật trong namespace demo.
    name: api-db-secret
    # Owner nghĩa là xóa ExternalSecret thì ESO cũng quản lý vòng đời Secret đích.
    creationPolicy: Owner
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/name: api-db-secret
  data:
  # secretKey là key trong Kubernetes Secret đích.
  - secretKey: password
    remoteRef:
      # key là tên secret trên AWS Secrets Manager.
      key: w10/db-password
      # property lấy field password từ JSON {"password":"..."}.
      property: password
