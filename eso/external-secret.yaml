# ExternalSecret maps AWS Secrets Manager secret w10/db-password to a Kubernetes
# Secret named api-db-secret in namespace demo.
#
# Expected AWS secret value:
# {"password":"initial-db-password"}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: api-db-password
  namespace: demo
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  refreshInterval: 30s
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: api-db-secret
    creationPolicy: Owner
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/name: api-db-secret
  data:
  - secretKey: password
    remoteRef:
      key: w10/db-password
      property: password
