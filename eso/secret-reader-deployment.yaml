# Demo workload that reads the synced secret from a mounted volume.
#
# Kubernetes updates mounted Secret volumes automatically after the K8s Secret
# changes, so rotating the AWS secret does not require restarting this pod.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: secret-reader
  namespace: demo
  labels:
    app: secret-reader
  annotations:
    # Chạy sau ExternalSecret để Secret api-db-secret có cơ hội được tạo trước.
    argocd.argoproj.io/sync-wave: "2"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: secret-reader
  template:
    metadata:
      labels:
        app: secret-reader
    spec:
      securityContext:
        # Không chạy root để thỏa Gatekeeper rule cấm runAsUser: 0.
        runAsUser: 1000
      containers:
      - name: reader
        image: busybox:1.36.1
        command:
        - sh
        - -c
        - |
          while true; do
            printf '%s db-password=' "$(date -Iseconds)"
            cat /mnt/db/password || true
            echo
            sleep 10
          done
        volumeMounts:
        # Đọc secret qua mounted volume. Kubernetes có thể cập nhật file secret
        # sau khi ESO rotate mà không cần restart pod.
        - name: db-password
          mountPath: /mnt/db
          readOnly: true
        resources:
          limits:
            # Có limits để thỏa Gatekeeper rule require-cpu-memory-limits.
            cpu: 50m
            memory: 64Mi
      volumes:
      - name: db-password
        secret:
          # Secret này do ESO tạo từ AWS Secrets Manager, không commit value vào Git.
          secretName: api-db-secret
