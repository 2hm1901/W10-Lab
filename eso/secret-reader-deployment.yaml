# Demo workload that reads the synced secret from a mounted volume.
#
# Kubernetes updates mounted Secret volumes automatically after the K8s Secret
# changes, so rotating the AWS secret does not require restarting this pod.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: secret-reader
  namespace: demo
  labels:
    app: secret-reader
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: secret-reader
  template:
    metadata:
      labels:
        app: secret-reader
    spec:
      securityContext:
        runAsUser: 1000
      containers:
      - name: reader
        image: busybox:1.36.1
        command:
        - sh
        - -c
        - |
          while true; do
            printf '%s db-password=' "$(date -Iseconds)"
            cat /mnt/db/password || true
            echo
            sleep 10
          done
        volumeMounts:
        - name: db-password
          mountPath: /mnt/db
          readOnly: true
        resources:
          limits:
            cpu: 50m
            memory: 64Mi
      volumes:
      - name: db-password
        secret:
          secretName: api-db-secret
